qdrant:
  host: "qdrant"
  port: 6333
  collection_name: "documents"
  api_key: null
  grpc_port: 6334
  prefer_grpc: false
  timeout: 30

embedder:
  model: "intfloat/multilingual-e5-base"
  batch_size: 32
  max_length: 512
  cache_dir: "/app/models/fastembed"

indexing:
  chunking:
    strategy: "recursive"
    chunk_size: 1000
    chunk_overlap: 150
    separators: ["\n\n", "\n", " ", ""]
    max_paragraph_length: 2000
  duplicate_policy: "OVERWRITE"
  batch_size: 64
  min_chunk_length: 50

llm:
  host: "http://ollama:11434"
  model: "qwen3:4b"
  temperature: 0.1
  top_p: 0.9
  max_tokens: 1024
  timeout: 120
  stream: true

retrieval:
  mode: "hybrid"
  top_k: 10
  top_n_after_rerank: 5
  score_threshold: null

query_enhancement:
  expansion:
    enabled: false
    n_variants: 3
    prompt_template: |
      Genera {n} varianti semanticamente equivalenti della seguente query.
      Restituisci solo le varianti, una per riga, senza numerazione.
      Query: {query}
  decomposition:
    enabled: false
    n_subqueries: 3
    prompt_template: |
      Scomponi la seguente domanda complessa in {n} sotto-domande semplici e indipendenti.
      Restituisci solo le sotto-domande, una per riga, senza numerazione.
      Domanda: {query}

reranker:
  enabled: false
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  batch_size: 16
  cache_dir: "/app/models/reranker"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost"
    - "http://localhost:8000"
    - "http://localhost:3000"
  max_upload_size_mb: 100

logging:
  level: "INFO"
  format: "text"
  file: null

evaluation:
  default_mode: "A"
  mode_a:
    n_samples: 50
    k_values: [1, 3, 5, 10]
    question_gen_prompt: |
      Leggi il seguente testo e formula una domanda a cui il testo risponde direttamente.
      Restituisci solo la domanda, senza altro testo.
      Testo: {chunk}
  mode_b:
    k_folds: 5
    k_values: [1, 3, 5, 10]
    judge_prompt_faithfulness: |
      Sei un giudice imparziale. Valuta se la risposta è fedele al contesto fornito.
      Contesto: {context}
      Risposta: {answer}
      Rispondi con un punteggio da 0 a 1 e una breve motivazione in JSON:
      {"score": <float>, "reason": "<str>"}
    judge_prompt_relevance: |
      Sei un giudice imparziale. Valuta se la risposta risponde alla domanda.
      Domanda: {question}
      Risposta: {answer}
      Rispondi con un punteggio da 0 a 1 e una breve motivazione in JSON:
      {"score": <float>, "reason": "<str>"}
  output_dir: "/app/eval_reports"
