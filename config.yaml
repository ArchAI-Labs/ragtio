qdrant:
  host: "qdrant"
  port: 6333
  collection_name: "documents"
  api_key: null
  grpc_port: 6334
  prefer_grpc: false
  timeout: 30

embedder:
  model: "intfloat/multilingual-e5-large"
  batch_size: 32
  max_length: 512
  cache_dir: "/app/models/fastembed"
  # embedding_dim: null     # override manuale della dimensione vettore (auto se null)
  # custom:                 # decommenta per usare un modello ONNX non supportato nativamente
  #   pooling: "MEAN"       # MEAN | CLS | MAX
  #   normalization: true
  #   hf_repo: "org/model-name"   # oppure url: "https://..."
  #   model_file: "onnx/model.onnx"
  #   dim: 384

indexing:
  chunking:
    strategy: "recursive"
    chunk_size: 1000
    chunk_overlap: 150
    separators: ["\n\n", "\n", " ", ""]
    max_paragraph_length: 2000
  duplicate_policy: "OVERWRITE"
  batch_size: 64
  min_chunk_length: 50

llm:
  provider: "ollama"          # "ollama" oppure "openai"
  host: "http://ollama:11434" # usato solo se provider=ollama
  think: false                # false = disabilita thinking mode (qwen3 e modelli reasoning)
  # openai_api_key: ""        # oppure usa la variabile d'ambiente OPENAI_API_KEY
  # openai_base_url: null     # lascia null per le API ufficiali OpenAI
  model: "qwen3:4b"           # es. "gpt-4o-mini" per OpenAI "qwen3:4b"
  temperature: 0.1
  top_p: 0.9
  max_tokens: -1                  # -1 = illimitato (Ollama); per OpenAI usa es. 4096
  timeout: 120
  stream: true
  system_prompt: "You are an expert and precise assistant. Answer questions based exclusively on the provided context. If the information is not in the context, say so explicitly. Always reply in the same language as the user's question."
  rag_prompt_template: "Context:\n{context}\n\nQuestion: {question}\n\nAnswer in the same language as the question above:"

retrieval:
  mode: "hybrid"
  top_k: 10
  top_n_after_rerank: 5
  score_threshold: null

query_enhancement:
  expansion:
    enabled: false
    n_variants: 3
    prompt_template: |
      Generate {n} semantically equivalent variants of the following query.
      Return only the variants, one per line, without numbering.
      Query: {query}
  decomposition:
    enabled: false
    n_subqueries: 3
    prompt_template: |
      Decompose the following complex question into {n} simple and independent sub-questions.
      Return only the sub-questions, one per line, without numbering.
      Question: {query}

reranker:
  enabled: false
  model: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  batch_size: 16
  cache_dir: "/app/models/reranker"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost"
    - "http://localhost:8000"
    - "http://localhost:3000"
  max_upload_size_mb: 100

logging:
  level: "INFO"
  format: "text"
  file: null

evaluation:
  default_mode: "A"
  mode_a:
    n_samples: 50
    k_values: [1, 3, 5, 10]
    # "question" = sempre domanda sintetica (Dense/Hybrid)
    # "keywords" = sempre keyword (Sparse/BM25)
    # "auto"     = domanda per dense/hybrid, keyword per sparse
    query_type: "auto"
    question_gen_prompt: |
      Read the following text and formulate a question that the text directly answers.
      Return only the question, without any other text.
      Text: {chunk}
    keyword_gen_prompt: |
      Read the following text and extract 3 to 6 keywords or short key phrases that represent it.
      Return only the keywords separated by commas, without any other text.
      Text: {chunk}
  mode_b:
    k_folds: 5
    k_values: [1, 3, 5, 10]
    judge_prompt_faithfulness: |
      You are an impartial judge. Evaluate whether the answer is faithful to the provided context.
      Context: {context}
      Answer: {answer}
      Reply with a score from 0 to 1 and a brief justification in JSON:
      {"score": <float>, "reason": "<str>"}
    judge_prompt_relevance: |
      You are an impartial judge. Evaluate whether the answer addresses the question.
      Question: {question}
      Answer: {answer}
      Reply with a score from 0 to 1 and a brief justification in JSON:
      {"score": <float>, "reason": "<str>"}
  output_dir: "/app/eval_reports"
