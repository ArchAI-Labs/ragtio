services:

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: rag_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag_network

  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # GPU passthrough opzionale — decommentare per GPU NVIDIA
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    networks:
      - rag_network

  ollama-init:
    image: curlimages/curl:latest
    container_name: rag_ollama_init
    restart: "no"
    depends_on:
      ollama:
        condition: service_started
    entrypoint: >
      sh -c "
        echo 'Attesa disponibilità Ollama...';
        until curl -sf http://ollama:11434/api/tags > /dev/null; do sleep 2; done;
        echo 'Scaricamento modello: ${OLLAMA_MODEL:-mistral}';
        curl -X POST http://ollama:11434/api/pull
          -H 'Content-Type: application/json'
          -d \"{\\\"name\\\": \\\"${OLLAMA_MODEL:-mistral}\\\"}\";
        echo 'Modello scaricato con successo.'
      "
    networks:
      - rag_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - app_models:/app/models
      - app_eval_reports:/app/eval_reports
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - OLLAMA_HOST=http://ollama:11434
      - CONFIG_PATH=/app/config.yaml
      - LOG_LEVEL=INFO
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rag_network

volumes:
  qdrant_data:
    driver: local
  ollama_models:
    driver: local
  app_models:
    driver: local
  app_eval_reports:
    driver: local

networks:
  rag_network:
    driver: bridge
